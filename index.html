<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  font-family:"Segoe UI", Arial, sans-serif;
  background:#f4f6f9;
}

/* CONTAINER */
.bar{
  width:100%;
  background:#ffffff;
  border-bottom:1px solid #e5e5e5;
  padding:14px 24px;
  box-sizing:border-box;
}

/* GRID */
.row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
  flex-wrap:wrap;
}

/* PROJECT */
.project{
  display:flex;
  flex-direction:column;
}

.name{
  font-size:18px;
  font-weight:600;
  color:#1f3b5c;
}

.client{
  font-size:12px;
  color:#6b6f76;
}

/* INFO BLOCKS */
.info{
  display:flex;
  gap:30px;
  flex-wrap:wrap;
}

.block{
  display:flex;
  flex-direction:column;
}

.label{
  font-size:10px;
  text-transform:uppercase;
  color:#8a8f98;
}

.value{
  font-size:13px;
  font-weight:600;
  color:#222;
}

/* STATUS */
.status{
  display:flex;
  gap:16px;
  align-items:center;
}

.status-item{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:12px;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
}

.green{background:#107c10;}
.yellow{background:#ffb900;}
.red{background:#d13438;}

</style>
</head>

<body>

<div class="bar">

  <div class="row">

    <!-- LEFT -->
    <div class="project">
      <div class="name" id="name">Project Name</div>
      <div class="client" id="client">Client Name</div>
    </div>

    <!-- MIDDLE -->
    <div class="info">

      <div class="block">
        <div class="label">Project Number</div>
        <div class="value" id="num">---</div>
      </div>

      <div class="block">
        <div class="label">Phase</div>
        <div class="value" id="phase">---</div>
      </div>

      <div class="block">
        <div class="label">Project Manager</div>
        <div class="value" id="pm">---</div>
      </div>

      <div class="block">
        <div class="label">GC</div>
        <div class="value" id="gc">---</div>
      </div>

      <div class="block">
        <div class="label">Owner</div>
        <div class="value" id="owner">---</div>
      </div>

    </div>

    <!-- RIGHT -->
    <div class="status">

      <div class="status-item">
        <div class="dot green" id="schedule"></div>
        <span>Schedule</span>
      </div>

      <div class="status-item">
        <div class="dot yellow" id="budget"></div>
        <span>Budget</span>
      </div>

      <div class="status-item">
        <div class="dot red" id="risk"></div>
        <span>Risk</span>
      </div>

    </div>

  </div>

</div>

<script>
const p=new URLSearchParams(location.search);

function set(id,key){
  const v=p.get(key);
  if(v) document.getElementById(id).innerText=v;
}

set("name","name");
set("client","client");
set("num","number");
set("phase","phase");
set("pm","pm");
set("gc","gc");
set("owner","owner");

function setStatus(id,value){
  if(!value) return;
  document.getElementById(id).className="dot " + value;
}

setStatus("schedule", p.get("schedule"));
setStatus("budget", p.get("budget"));
setStatus("risk", p.get("risk"));
</script>

</body>
</html>
