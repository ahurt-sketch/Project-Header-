<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  font-family: "Segoe UI", Arial, sans-serif;
  background:#ffffff;
}

/* SIDEBAR CARD */
.card{
  width:280px;
  border-left:4px solid #1f3b5c;
  background:#fff;
  padding:14px;
  box-sizing:border-box;
}

/* HEADER */
.header{
  border-bottom:1px solid #e5e5e5;
  padding-bottom:10px;
  margin-bottom:12px;
}

.title{
  font-size:16px;
  font-weight:600;
  color:#1f3b5c;
}

.subtitle{
  font-size:11px;
  color:#6b6f76;
  margin-top:2px;
}

/* STATUS */
.badge{
  display:inline-block;
  margin-top:8px;
  padding:4px 10px;
  font-size:11px;
  font-weight:600;
  border:1px solid #1f3b5c;
  color:#1f3b5c;
  background:#f5f7fa;
}

/* FIELDS */
.field{
  padding:10px 0;
  border-bottom:1px solid #f0f0f0;
}

.label{
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:0.5px;
  color:#8a8f98;
}

.value{
  font-size:13px;
  font-weight:600;
  color:#222;
  margin-top:3px;
}
</style>

</head>

<body>

<div class="card">

  <div class="header">
    <div class="title" id="name">PROJECT NAME</div>
    <div class="subtitle">Project Information</div>
    <div class="badge" id="phase">DESIGN</div>
  </div>

  <div class="field">
    <div class="label">Project Number</div>
    <div class="value" id="num">---</div>
  </div>

  <div class="field">
    <div class="label">Client</div>
    <div class="value" id="client">---</div>
  </div>

  <div class="field">
    <div class="label">Project Manager</div>
    <div class="value" id="pm">---</div>
  </div>

</div>

<script>
const p=new URLSearchParams(location.search);

const set=(id,key)=>{
  const v=p.get(key);
  if(v) document.getElementById(id).innerText=v;
};

set("name","name");
set("num","number");
set("client","client");
set("pm","pm");

const phase=p.get("phase");
if(phase){
  const b=document.getElementById("phase");
  b.innerText=phase.toUpperCase();

  if(phase.toLowerCase()==="construction"){
    b.style.borderColor="#1f3b5c";
    b.style.color="#1f3b5c";
  }
  if(phase.toLowerCase()==="design"){
    b.style.borderColor="#666";
    b.style.color="#666";
  }
}
</script>

</body>
</html>
