<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{margin:0;font-family:Segoe UI,Arial;background:#f4f6f9}
.card{border-radius:14px;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,0.08);background:white}
.header{background:linear-gradient(135deg,#2b579a,#4a90e2);color:white;padding:18px 20px;display:flex;justify-content:space-between;align-items:center}
.left{display:flex;align-items:center;gap:14px}
.logo{width:48px;height:48px;border-radius:10px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center}
.badge{padding:8px 14px;border-radius:999px;font-size:12px;font-weight:600}
.content{padding:18px 20px;display:grid;grid-template-columns:repeat(2,1fr);gap:16px 24px}
.label{font-size:11px;text-transform:uppercase;color:#6b6f76}
.value{font-size:15px;font-weight:600}
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="left">
      <div class="logo">🏗️</div>
      <div>
        <div id="name" style="font-size:20px;font-weight:600;">Project</div>
        <div style="font-size:12px;opacity:.8;">Project Overview</div>
      </div>
    </div>
    <div class="badge" id="phase">DESIGN</div>
  </div>

  <div class="content">
    <div><div class="label">Project Number</div><div class="value" id="num">000</div></div>
    <div><div class="label">Client</div><div class="value" id="client">Client</div></div>
    <div><div class="label">Project Manager</div><div class="value" id="pm">PM</div></div>
  </div>
</div>

<script>
const p=new URLSearchParams(location.search);
const set=(id,key)=>p.get(key)&&(document.getElementById(id).innerText=p.get(key));
set("name","name");set("num","number");set("client","client");set("pm","pm");

const phase=p.get("phase");
if(phase){
  const b=document.getElementById("phase");
  b.innerText=phase.toUpperCase();
  if(phase==="Construction"){b.style.background="#107c10";b.style.color="white";}
  else if(phase==="Design"){b.style.background="#ffb900";}
}
</script>

</body>
</html>
