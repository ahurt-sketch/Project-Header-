<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  font-family:"Segoe UI", Arial, sans-serif;
  background:#ffffff;
}

.card{
  width:280px;
  border-left:4px solid #1f3b5c;
  background:#fff;
  padding:16px;
  box-sizing:border-box;
}

.title{
  font-size:16px;
  font-weight:600;
  color:#1f3b5c;
}

.client{
  font-size:12px;
  color:#6b6f76;
  margin-bottom:12px;
}

/* INFO */
.field{
  margin-bottom:10px;
}

.label{
  font-size:10px;
  text-transform:uppercase;
  color:#8a8f98;
}

.value{
  font-size:13px;
  font-weight:600;
  color:#222;
}

/* STATUS */
.status{
  margin-top:14px;
  border-top:1px solid #e5e5e5;
  padding-top:12px;
}

.status-row{
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
  font-size:12px;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  display:inline-block;
}

.green{background:#107c10;}
.yellow{background:#ffb900;}
.red{background:#d13438;}

</style>
</head>

<body>

<div class="card">

  <!-- HEADER -->
  <div class="title" id="name">Project Name</div>
  <div class="client" id="client">Client Name</div>

  <!-- INFO -->
  <div class="field">
    <div class="label">Project Number</div>
    <div class="value" id="num">---</div>
  </div>

  <div class="field">
    <div class="label">Project Manager</div>
    <div class="value" id="pm">---</div>
  </div>

  <div class="field">
    <div class="label">Current Phase</div>
    <div class="value" id="phase">---</div>
  </div>

  <div class="field">
    <div class="label">General Contractor</div>
    <div class="value" id="gc">---</div>
  </div>

  <div class="field">
    <div class="label">Owner</div>
    <div class="value" id="owner">---</div>
  </div>

  <!-- STATUS -->
  <div class="status">
    <div class="status-row">
      <span>Schedule</span>
      <span class="dot green" id="schedule"></span>
    </div>

    <div class="status-row">
      <span>Budget</span>
      <span class="dot yellow" id="budget"></span>
    </div>

    <div class="status-row">
      <span>Risk</span>
      <span class="dot red" id="risk"></span>
    </div>
  </div>

</div>

<script>
const p=new URLSearchParams(location.search);

function set(id,key){
  const v=p.get(key);
  if(v) document.getElementById(id).innerText=v;
}

set("name","name");
set("client","client");
set("num","number");
set("pm","pm");
set("phase","phase");
set("gc","gc");
set("owner","owner");

function setStatus(id,value){
  const el=document.getElementById(id);
  if(!value) return;
  el.className="dot " + value;
}

setStatus("schedule", p.get("schedule"));
setStatus("budget", p.get("budget"));
setStatus("risk", p.get("risk"));
</script>

</body>
</html>
